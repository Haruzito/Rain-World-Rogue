<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rain World Rogue</title>
<link rel="icon" href="img/favicon.png?v=2">
<link rel="shortcut icon" href="img/favicon.png?v=2">
<link rel="apple-touch-icon" href="img/favicon.png?v=2">
<link rel="icon" type="image/png" href="./img/favicon.png?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="./img/favicon.png?v=2">

<style>

/*LOGO HUD*/
#logo {
  position: fixed;
  top: 10px;
  left: 10px;

  width: auto;
  text-align: left;

  z-index: 999;
}

#logo img {
  width: 130px;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
}

.logo-card {
  background: rgba(0,0,0,0.35);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 10px;

  padding: 10px 20px;

  display: inline-block;

  backdrop-filter: blur(6px);

  transition: 0.2s;
}

.logo-card:hover {
  border-color: white;
  background: rgba(255,255,255,0.05);
}

/* Card Shelter */
.card.card-wide {
  width: 100% !important;
  max-width: 600px;
}

.card.leviathan-card {
  width: 100% !important;
  max-width: 650px;

  border: 2px solid rgba(0, 180, 255, 0.7);
  background: rgba(0, 0, 20, 0.5);
}

/*LOGO HUD*/

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5); /* escurece o fundo */
  z-index: -1;
}

body {
  margin: 0;
  overflow: hidden;
}

#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 120%;
  height: 120%;

  background-image: url("img/bg_outskirts.jpg");
  background-size: cover;
  background-position: center;

  transform: translate(0px, 0px);
  transition: transform 0.1s linear;

  z-index: -2;
}

.karma-icon {
  width: 40px;
  opacity: 0.9;
}

.pip {
  width: 10px;
  height: 10px;
  image-rendering: pixelated;
}

html, body {
  height: 100%;
}

#layout {
  display: flex;
  justify-content: center;
  align-items: center;

  width: 100%;
  height: 100%;
}

#panel {
  width: 95%;
  height: 90%;
  max-width: 1400px;
  max-height: 800px;

  display: flex;
  background: rgba(0,0,0,0.35); /* leve transparência */
  backdrop-filter: blur(6px);

  border: 2px solid rgba(255,255,255,0.4);
}

#left {
  width: 30%;
  min-width: 260px;
  padding: 15px;
  box-sizing: border-box;

  display: flex;
  flex-direction: column;
  gap: 12px;
}

#center {
  width: 50%;
  display: flex;
  flex-direction: column;
}

#right {
  width: 20%;
  padding: 15px;
  box-sizing: border-box;
}

#terminal {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  white-space: pre-line;

  background: rgba(0,0,0,0.35); /* igual Rain World */
  color: #cfd6df;

  backdrop-filter: blur(3px);
}

#actions {
  padding: 10px;

  border-top: none;
  background: none;

  display: flex;
  justify-content: center;
}

.actions-card {
  background: rgba(0,0,0,0.35);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 10px;

  padding: 12px;

  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.card.mercador {
  border: 2px solid rgba(255,255,255,0.5);
  background: rgba(0,0,0,0.4);
}

.mercador {
  border: 2px solid rgba(255,255,255,0.5);
  background: rgba(0,0,0,0.4);
}

/*REGIÕES CARD*/
#regiaoBanner {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);

  z-index: 999;

  background: rgba(0,0,0,0.5);
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 10px;

  padding: 8px 20px;

  color: white;
  font-weight: bold;
  letter-spacing: 2px;

  backdrop-filter: blur(6px);

  text-transform: uppercase;
}

/* 🧾 CARD BASE DO CHAT */
.msg-card {
  background: rgba(0,0,0,0.35);
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 8px;

  padding: 8px 10px;
  margin-bottom: 8px;

  backdrop-filter: blur(3px);
  font-family: 'Segoe UI', sans-serif;
}

/* 🎯 EVENTOS */
.evento-card {
  border-color: rgba(120,180,255,0.6);
}

/* ⚔️ COMBATE */
.combate-card {
  border-color: rgba(255,100,100,0.6);
}

/* ⚙️ SISTEMA */
.sistema-card {
  border-color: rgba(200,200,200,0.5);
}

/* BOTÕES */

:root {
  --text: #cfd6df;       /* texto principal */
  --soft: #9aa3ad;       /* texto secundário */
  --border: rgba(255,255,255,0.35);
  --bg-dark: rgba(0,0,0,0.35);
}

button {
  background: rgba(0,0,0,0.5);
  border: 2px solid rgba(255,255,255,0.5);
  color: #cfd6df;

  padding: 6px 18px;
  font-size: 13px;
  letter-spacing: 1px;

  border-radius: 6px;

  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  border-color: white;
  color: white;
  background: rgba(255,255,255,0.08);
}

button:active {
  transform: scale(0.95);
  opacity: 0.7;
}

.box {
  background: rgba(0,0,0,0.4);
  border: 2px solid rgba(255,255,255,0.4);
}

input {
  padding: 10px;
  background: #081c08;
  color: #9bbc0f;
  border-top: 2px solid #9bbc0f;
  outline: none;
}

.card {
  background: rgba(0,0,0,0.3);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  padding: 10px;
  margin-bottom: 10px;
  width: 180px;

  display: flex;              
  flex-direction: column;     
  align-items: center;        
  text-align: center;         

  transition: 0.2s;
}

.card:hover {
  border-color: white;
  background: rgba(255,255,255,0.05);
  transform: scale(1.02);
}

.card-container {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.titulo-card {
  font-weight: bold;
  color: #e6edf5;
  margin-bottom: 4px;
  font-family: 'Rodondo', sans-serif;
  letter-spacing: 2px;
}

.alerta {
  display: flex;
  align-items: center;
  gap: 10px;

  background: rgba(120, 0, 0, 0.15);
  border: 2px solid rgba(255, 255, 0, 0.9);
  border-radius: 8px;

  color: #ffffaa;
  padding: 10px;

  backdrop-filter: blur(3px);
}

@keyframes piscar {
  from { opacity: 1; }
  to { opacity: 0.6; }
}

/* =========================
   🔋 BARRA VERTICAL HP
========================= */

.hp-wrapper {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 8px;
}

.hp-vertical {
  width: 8px;
  height: 60px;

  border: 2px solid rgb(255, 255, 255);
  background: red;

  display: flex;
  flex-direction: column-reverse;

  overflow: hidden;
  border-radius: 0; /* sem arredondamento */
}

.hp-fill {
  width: 100%;
  background: lime; /* verde sólido estilo RW */
  transition: height 0.2s;
}

/*BARRA DE VIDA CRIATURA*/
.enemy-card .hud-main {
  flex-direction: row;
  align-items: center;
}


/*CARD HUD JOGADOR*/
.hud-card {
  background: rgba(0,0,0,0.45);
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 12px;
  padding: 12px;
  backdrop-filter: blur(6px);
}

.hud-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

.hud-img {
  width: 70px;
  height: 70px;
  object-fit: contain;
}

.hud-title {
  font-weight: bold;
  letter-spacing: 2px;
  color: white;
}

.hud-sub {
  color: #9aa3ad;
  font-size: 12px;
}

.hud-section {
  margin-top: 10px;
}

.hud-label {
  font-size: 12px;
  color: #9aa3ad;
  margin-bottom: 3px;
}

.bar {
  position: relative;
  height: 14px;
  border: 2px solid #9bbc0f;
}

.bar-fill {
  background: #4CAF50;
  height: 100%;
  transition: 0.3s;
}

.bar-text {
  position: absolute;
  width: 100%;
  text-align: center;
  font-size: 10px;
  top: 0;
  color: black;
  font-weight: bold;
}

.hud-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px 8px;

  width: 100%;
  margin-top: 8px;

  color: #cfd6df;
  font-size: 12px;

  flex-shrink: 0;
}

.hud-info {
  margin-top: 10px;
  font-size: 11px;
  color: #9aa3ad;
}

.hud-main {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  width: 100%;
}

.hud-right {
  margin-left: auto;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.hud-text {
  display: flex;
  flex-direction: column;
  gap: 4px;

  flex: 1;
  min-width: 140px;
}

/* lado direito (karma + pips) */
.hud-right {
  margin-left: auto;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

/*Fechar Card Hud jogador*/

/*CARD DO HUD INIMIGO*/
.enemy-card {
  border-color: rgba(255,100,100,0.6);
}

.enemy-bar {
  border: 2px solid red;
}

.enemy-fill {
  background: red;
}
/*LAYOUT BACKGROUND ANIMATED*/
#bg-layer {
  position: fixed;
  top: 0;
  left: 0;

  width: 200%;
  height: 100%;

  background-repeat: repeat-x;
  background-size: cover;

  z-index: -2;

  animation: scrollBg 60s linear infinite;
}

/* escurecimento estilo Rain World */
#bg-layer::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
}

@keyframes scrollBg {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

#bg-far {
  position: fixed;
  width: 200%;
  height: 100%;
  background-repeat: repeat-x;
  animation: scrollBg 120s linear infinite;
  z-index: -3;
  filter: brightness(0.5);
}

#bg-mid {
  position: fixed;
  width: 200%;
  height: 100%;
  background-repeat: repeat-x;
  animation: scrollBg 60s linear infinite;
  z-index: -2;
  filter: brightness(0.7);
}

.gameover {
  background: rgba(120, 0, 0, 0.15); /* vermelho bem transparente */
  border: 2px solid rgba(255, 80, 80, 0.8);
  border-radius: 10px;

  color: #ffdede;

  padding: 20px;
  margin: 20px 0;

  text-align: center;

  backdrop-filter: blur(4px);
}
</style>
</head>

<body>

  <div id="bg"></div>

  <div id="bg-layer"></div>

<div id="logo">
  <div class="logo-card">
    <img src="img/rwr.png">
  </div>
</div>

<div id="regiaoBanner"></div>

<div id="layout">
  <div id="panel">

    <div id="left">
      <div id="player"></div>
      <div id="enemy"></div>
    </div>

    <div id="center">
  <div id="terminal"></div>

  <div id="actions"></div> <!-- 👈 NOVO -->
</div>

    <div id="right">

  <div id="regiaoHUD"></div>

  <div id="info"></div>

</div>

  </div>
</div>

<script>

let term = document.getElementById("terminal");

let modo = "menu";
let fase = 1;
let room = 1;
let bloqueioProgresso = false;
function checarRegiao() {

  if (room % 10 === 0) {
    eventoRegiao();
  }

}
let enemy = null;
let fasesCompletadas = 0;
updateEnemyHUD();
let results = [];

let defesaTemp = 0;

let regiao = {
  nome: "Outskirts",
  karmaNecessario: 0,
  bg: "img/bg_outskirts.jpg"
};
let player = {
  nome: "",
  classeBase: "",
  classeAtual: "",
  evolucoes: [],

  karma: 1,
maxKarma: 10,

  // ❤️ VIDA
  hp: 30,
  maxHp: 30,

  // ⚔️ COMBATE BASE
  atk: 0,
  def: 0,

  // 🍗 PIPS (energia)
  comida: 0,
  maxComida: 7,

  // 🧬 ATRIBUTOS
  str: 0, // força
  ref: 0, // reflexo
  vel: 0, // velocidade
  int: 0, // inteligência

  // 🎲 DADOS BASE
  strDice: 10,
  refDice: 10,
  velDice: 10,
  intDice: 10,

  // 🎮 TURNOS
  movimento: 1,
  acao: 1,
  dodge: 0,

  // 📊 STATUS
  status: [],

  // 💰 PROGRESSÃO
  perolas: 0,
  nivel: 1,
  xp: 0,

  // 🔥 HABILIDADES
  habilidades: [],

  inventario: []
};

const regioes = [
  {
    nome: "Outskirts",
    karmaNecessario: 0,
    bg: "img/bg_outskirts.jpg"
  },
  {
    nome: "Industrial Complex",
    karmaNecessario: 3,
    bg: "img/bg_industrial.jpg"
  },
  {
    nome: "Shaded Citadel",
    karmaNecessario: 6,
    bg: "img/bg_shaded.jpg"
  }
];

let indiceRegiao = 0;

// 🎮 CLASSES SLUGCAT
const classes = {
  monk:   { hp: 35, atk: 2, def: 3 },
  survivor:{ hp: 30, atk: 3, def: 2 },
  hunter: { hp: 22, atk: 5, def: 1 }
};
const statsEvolucoes = {
  gourmond: { hp: 50, atk: 3, def: 6 },
  santo: { hp: 40, atk: 2, def: 7 },

  watcher: { hp: 38, atk: 5, def: 4 },
  inv: { hp: 36, atk: 6, def: 3 },

  artificer: { hp: 30, atk: 10, def: 1 },
  spearmaster: { hp: 28, atk: 9, def: 2 }
};
const evolucoes = {
  monk: ["gourmond", "santo"],
  survivor: ["watcher", "inv"],
  hunter: ["artificer", "spearmaster"]
};
const habilidades = {

  // 🟡 MONK
  monk: [
    {
      nome: "Empurrão",
      custo: 1,
      desc: "Ataque leve com chance de evitar dano",
      efeito: (player, enemy) => {
        let dmg = player.str + Math.floor(Math.random()*player.strDice);
        enemy.hp -= dmg;

        player.dodge += 2;

        return `Empurrão causou ${dmg} e aumentou dodge!`;
      },
      nivel: 1
    }
  ],

  // 🔵 SURVIVOR
  survivor: [
    {
      nome: "Golpe Preciso",
      custo: 2,
      desc: "Alto dano baseado em REF",
      efeito: (player, enemy) => {
        let dmg = player.atk + player.ref * 2;
        enemy.hp -= dmg;

        return `Golpe preciso causou ${dmg}`;
      },
      nivel: 2
    }
  ],

  // 🔴 HUNTER
  hunter: [
    {
      nome: "Investida",
      custo: 3,
      desc: "Dano alto, risco maior",
      efeito: (player, enemy) => {
        let dmg = player.atk + player.str * 3;
        enemy.hp -= dmg;

        player.hp -= 2; // recoil

        return `Investida causou ${dmg} (recuo de 2 HP)`;
      },
      nivel: 2
    }
  ],

  // 🧀 GOURMOND
  gourmond: [
    {
      nome: "Impacto Pesado",
      custo: 3,
      desc: "Dano massivo baseado em STR",
      efeito: (player, enemy) => {
        let dmg = player.str * 4;
        enemy.hp -= dmg;

        return `Impacto causou ${dmg}`;
      },
      nivel: 3
    }
  ],

  // 🔥 ARTIFICER
  artificer: [
    {
      nome: "Explosão",
      custo: 4,
      desc: "Dano absurdo",
      efeito: (player, enemy) => {
        let dmg = player.atk * 3;
        enemy.hp -= dmg;

        return `💥 Explosão causou ${dmg}`;
      },
      nivel: 3
    }
  ]

};

function print(t, tipo="normal") {

  let classe = "msg-card";

  if (tipo === "evento") classe += " evento-card";
  if (tipo === "combate") classe += " combate-card";
  if (tipo === "sistema") classe += " sistema-card";

  let d = document.createElement("div");
  d.className = classe;
  d.innerText = t;

  term.appendChild(d);
  term.scrollTop = term.scrollHeight;
  updateHUD();
}

function updateHUD() {

  let imgPlayer = "img/" + player.classeAtual + ".png";

  let hpPercent = (player.hp / player.maxHp) * 100;

  // barra de comida (pips)
let pips = "";

for (let i = 0; i < player.maxComida; i++) {

  if (i < player.comida) {
    pips += "<img src='img/pip_full.png' class='pip'>";
  } else {
    pips += "<img src='img/pip_empty.png' width='16'>";
  }

}

let karmaImg = "img/Karma_" + player.karma + ".png";

  document.getElementById("player").innerHTML = `
<div class="hud-card">

  <div class="hud-main">

  <!-- HP -->
  <div class="hp-wrapper">
    <div class="hp-vertical">
      <div class="hp-fill" style="height:${hpPercent}%"></div>
    </div>
  </div>

  <!-- INFO CENTRAL -->
  <div class="hud-text">

      <img src="${imgPlayer}" class="hud-img">

      <div class="hud-title">SLUGCAT</div>
      <div class="hud-sub">${player.classeAtual}</div>

    </div>

    <!-- KARMA + PIPS -->
    <div class="hud-right">

      <img src="${karmaImg}" class="karma-icon">

      <div style="display:flex; gap:4px;">
        ${pips}
      </div>

    </div>

  </div>

  <!-- STATS -->
  <div class="hud-stats">
    <div>ATK: ${player.atk}</div>
    <div>DEF: ${player.def}</div>
    <div>STR: ${player.str}</div>
    <div>REF: ${player.ref}</div>
    <div>VEL: ${player.vel}</div>
    <div>INT: ${player.int}</div>
  </div>

  <!-- INFO -->
  <div class="hud-info">
    Sala: ${room}/5<br>
    Fases: ${fasesCompletadas}<br>
    Nível: ${player.nivel}<br>
    Pérolas: ${player.perolas}

    Região: ${regiao.nome}<br>
    Karma Req: ${regiao.karmaNecessario}<br>
  </div>

</div>
`;
(player.inventario.join(", ") || "Vazio");

atualizarBannerRegiao();
}

function atualizarBannerRegiao() {

  let banner = document.getElementById("regiaoBanner");

  banner.innerHTML = `
    🌍 ${regiao.nome}
  `;
}

// FUNDOS RAIN WORLD ROGUE
function aplicarBackground() {
  const bg = regiao.bg;

  document.body.style.backgroundImage = `
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
    url('${bg}')
  `;

  document.body.style.backgroundSize = "cover";
  document.body.style.backgroundPosition = "center";
  document.body.style.backgroundRepeat = "no-repeat";
}

aplicarBackground();

function startGame() {
  printHTML(
    "<div class='box'>Escolha sua classe:</div>" +

    "<div class='card-container'>" +
      criarCardClasse("Monk", "monk", "img/monk.png") +
      criarCardClasse("Survivor", "survivor", "img/survivor.png") +
      criarCardClasse("Hunter", "hunter", "img/hunter.png") +
    "</div>"
  );

  aplicarBackground();

  modo = "class";

  atualizarBackground();
}
function selecionarClasse(cmd) {
  term.innerHTML = "";
  let c = classes[cmd];

  player.classeBase = cmd;
  player.classeAtual = cmd;

  player.hp = c.hp;
  player.maxHp = c.hp;
  player.atk = c.atk;
  player.def = c.def;

  player.habilidades = [...(habilidades[cmd] || [])];
  
  player.evolucoes = evolucoes[cmd] || [];

  print("Classe escolhida: " + cmd);

  modo = "game";
  mostrarAcoes();
}
function mostrarAcoes() {
  if (modo === "dead") return;
  setAcoes(
    "<button onclick='acaoExplorar()'>Explorar</button>" +
    "<button onclick='abrirInventario()'>Inventário</button>"
  );
}
function acaoExplorar() {
  nextRoom();
}

function abrirInventario() {

  if (player.inventario.length === 0) {
    print("Inventário vazio", "sistema");
    return;
  }

  let html = `
    <div class="box">🎒 Inventário</div>
    <div class="card-container">
  `;

  player.inventario.forEach(item => {

    html += `
      <div class="card">

        <div class="titulo-card">${item}</div>

        <button onclick="usarItem('${item}')">
          Usar
        </button>

      </div>
    `;

  });

  html += "</div>";

  printHTML(html);

  setAcoes("<button onclick='mostrarAcoes()'>Voltar</button>");
}

function abrirInventarioCombate() {
  if (modo === "dead") return;

  if (player.inventario.length === 0) {
    print("Inventário vazio", "sistema");
    return;
  }

  let html = `
    <div class="box">⚔️ Itens (Combate)</div>
    <div class="card-container">
  `;

  player.inventario.forEach(item => {

    html += `
      <div class="card">

        <div class="titulo-card">${item}</div>

        <button onclick="usarItemCombate('${item}')">
          Usar
        </button>

      </div>
    `;

  });

  html += "</div>";

  printHTML(html);

function ganharXP(valor) {
  player.xp += valor;

  if (player.xp >= player.nivel * 10) {
    player.xp -= player.nivel * 10;
    player.nivel++;

    print("✨ LEVEL UP! Nível " + player.nivel, "evento");

    desbloquearHabilidades();
  }
}

  let lista = habilidades[player.classeAtual] || [];

      player.habilidades.push(hab);

function sortearItem() {

  let tabela = [
    { item: "pedra", peso: 50 },
    { item: "fruta", peso: 35 },
    { item: "lança", peso: 15 }
  ];

  // 🍗 fome influencia comida
  if (player.comida <= 2) {
    tabela.find(i => i.item === "fruta").peso += 30;
  }

  // ⚔️ combate favorece armas
  if (fase >= 2) {
    tabela.find(i => i.item === "lança").peso += 10;
  }

  // 🪨 pedra vira “fallback seguro”
  if (enemy && enemy.hp > player.hp) {
    tabela.find(i => i.item === "pedra").peso += 20;
  }

  let total = tabela.reduce((s, i) => s + i.peso, 0);
  let roll = Math.random() * total;

  let acumulado = 0;

  for (let i of tabela) {
    acumulado += i.peso;
    if (roll <= acumulado) return i.item;
  }

  return "pedra";
}

  term.appendChild(d);

  updateHUD();
}

function criarCardClasse(nome, classe, img, tipo="classe") {

  let c = classes[classe] || statsEvolucoes[classe] || { hp: "?", atk: "?", def: "?" };

  let acao = tipo === "evolucao"
    ? `evoluirClasse('${classe}')`
    : `selecionarClasse('${classe}')`;

  return `
  <div class="card" onclick="${acao}">

    <img src="${img}" width="80">

    <div>
      <div class="titulo-card">${nome}</div>

      <div>HP: ${c.hp}</div>
      <div>ATK: ${c.atk}</div>
      <div>DEF: ${c.def}</div>
    </div>

  </div>
  `;
}

function limiteInventario() {
  switch(player.classeAtual) {
    case "spearmaster": return 2;
    case "hunter": return 4;
    case "artificer": return 3;
    default: return 2;
  }
}

function confirmarTroca(index, novoItem) {

}

  let antigo = player.inventario[index];

  // aqui você pode validar compatibilidade depois
  player.inventario[index] = novoItem;

  print(`Você trocou ${antigo} por ${novoItem}`, "evento");

  mostrarAcoes();
}

function acaoAtacar() {

  if (modo === "dead") return;

  if (!enemy) return;

  let crit = Math.random() < 0.25;
  let base = player.atk + Math.floor(Math.random()*6);
  let dmg = crit ? base * 2 : base;

  dmg = Math.max(0, dmg - (enemy.def || 0));

  enemy.hp -= dmg;

  print("Você causa " + dmg + (crit ? " 💥 CRÍTICO!" : ""));

  if (enemy.hp <= 0) {
    matarInimigo();
    print("Inimigo derrotado!");

    onEnemyDeath(enemy.name);
    ganharXP(5);

    enemy = null;
    updateEnemyHUD();
    modo = "game";

    mostrarAcoes();
    return;
  }

  enemyTurn();
}

function acaoAgir() {

  if (modo === "dead") return;

  }

      "<button onclick='acaoFugir()'>Fugir</button>" +

    );
  }
}

function acaoFugir() {

  if (modo === "dead") return;

  let chance = 0.5; // base

  // 🪶 vantagem se estiver muito machucado
  if (player.hp < player.maxHp * 0.3) {
    chance += 0.15;
  }

  // ⚔️ inimigo mais forte reduz chance
  if (enemy.atk > player.def) {
    chance -= 0.1;
  }

  // 🧠 limite de segurança (evita chance negativa ou absurda)
  chance = Math.max(0.05, Math.min(chance, 0.9));

  if (Math.random() < chance) {
    print("Você conseguiu fugir!");

    enemy = null;
    updateEnemyHUD();

    modo = "game";
    mostrarAcoes();

  } else {
    print("Falha ao fugir!");
    enemyTurn();
  }
}
