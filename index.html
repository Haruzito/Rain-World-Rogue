<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Slugcat Roguelike</title>

<style>
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5); /* escurece o fundo */
  z-index: -1;
}

body {
  margin: 0;

  background: url("img/bg.jpg") no-repeat center center fixed;
  background-size: cover;

  color: #cfd6df;
  font-family: 'Segoe UI', sans-serif;
}

html, body {
  height: 100%;
}

#layout {
  display: flex;
  justify-content: center;
  align-items: center;

  width: 100%;
  height: 100%;
}

#panel {
  width: 95%;
  height: 90%;
  max-width: 1400px;
  max-height: 800px;

  display: flex;
  background: rgba(0,0,0,0.35); /* leve transparência */
  backdrop-filter: blur(6px);

  border: 2px solid rgba(255,255,255,0.4);
}

#left {
  width: 30%;
  min-width: 260px;
  padding: 15px;
  box-sizing: border-box;

  display: flex;
  flex-direction: column;
  gap: 12px;
}

#center {
  width: 50%;
  display: flex;
  flex-direction: column;
}

#right {
  width: 20%;
  padding: 15px;
  box-sizing: border-box;
}

#terminal {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  white-space: pre-line;

  background: rgba(0,0,0,0.35); /* igual Rain World */
  color: #cfd6df;

  backdrop-filter: blur(3px);
}

#actions {
  padding: 10px;

  border-top: none;
  background: none;

  display: flex;
  justify-content: center;
}

.actions-card {
  background: rgba(0,0,0,0.35);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 10px;

  padding: 12px;

  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.card.mercador {
  border: 2px solid rgba(255,255,255,0.5);
  background: rgba(0,0,0,0.4);
}

.mercador {
  border: 2px solid rgba(255,255,255,0.5);
  background: rgba(0,0,0,0.4);
}

/* 🧾 CARD BASE DO CHAT */
.msg-card {
  background: rgba(0,0,0,0.35);
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 8px;

  padding: 8px 10px;
  margin-bottom: 8px;

  backdrop-filter: blur(3px);
  font-family: 'Segoe UI', sans-serif;
}

/* 🎯 EVENTOS */
.evento-card {
  border-color: rgba(120,180,255,0.6);
}

/* ⚔️ COMBATE */
.combate-card {
  border-color: rgba(255,100,100,0.6);
}

/* ⚙️ SISTEMA */
.sistema-card {
  border-color: rgba(200,200,200,0.5);
}

/* BOTÕES */

:root {
  --text: #cfd6df;       /* texto principal */
  --soft: #9aa3ad;       /* texto secundário */
  --border: rgba(255,255,255,0.35);
  --bg-dark: rgba(0,0,0,0.35);
}

button {
  background: rgba(0,0,0,0.5);
  border: 2px solid rgba(255,255,255,0.5);
  color: #cfd6df;

  padding: 6px 18px;
  font-size: 13px;
  letter-spacing: 1px;

  border-radius: 6px;

  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  border-color: white;
  color: white;
  background: rgba(255,255,255,0.08);
}

button:active {
  transform: scale(0.95);
  opacity: 0.7;
}

.box {
  background: rgba(0,0,0,0.4);
  border: 2px solid rgba(255,255,255,0.4);
}

input {
  padding: 10px;
  background: #081c08;
  color: #9bbc0f;
  border-top: 2px solid #9bbc0f;
  outline: none;
}

.card {
  background: rgba(0,0,0,0.3);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  padding: 10px;
  margin-bottom: 10px;
  width: 180px;

  display: flex;              
  flex-direction: column;     
  align-items: center;        
  text-align: center;         

  transition: 0.2s;
}

.card:hover {
  border-color: white;
  background: rgba(255,255,255,0.05);
  transform: scale(1.02);
}

.card-container {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.titulo-card {
  font-weight: bold;
  color: #e6edf5;
  margin-bottom: 4px;
  font-family: 'Rodondo', sans-serif;
  letter-spacing: 2px;
}

.alerta {
  display: flex;
  align-items: center;
  gap: 10px;

  background: rgba(120, 0, 0, 0.15);
  border: 2px solid rgba(255, 255, 0, 0.9);
  border-radius: 8px;

  color: #ffffaa;
  padding: 10px;

  backdrop-filter: blur(3px);
}

@keyframes piscar {
  from { opacity: 1; }
  to { opacity: 0.6; }
}

.gameover {
  background: rgba(120, 0, 0, 0.15); /* vermelho bem transparente */
  border: 2px solid rgba(255, 80, 80, 0.8);
  border-radius: 10px;

  color: #ffdede;

  padding: 20px;
  margin: 20px 0;

  text-align: center;

  backdrop-filter: blur(4px);
}
</style>
</head>

<body>

<div id="layout">
  <div id="panel">

    <div id="left">
      <div id="player"></div>
      <div id="enemy"></div>
    </div>

    <div id="center">
  <div id="terminal"></div>

  <div id="actions"></div> <!-- 👈 NOVO -->
</div>

    <div id="right">
      <div id="info"></div>
    </div>

  </div>
</div>

<script>

let term = document.getElementById("terminal");

let modo = "menu";
let fase = 1;
let room = 1;
let enemy = null;
let fasesCompletadas = 0;
updateEnemyHUD();
let results = [];

let defesaTemp = 0;

let player = {
  nome: "",
  classeBase: "",
  classeAtual: "",
  evolucoes: [],

  // ❤️ VIDA
  hp: 30,
  maxHp: 30,

  // ⚔️ COMBATE BASE
  atk: 0,
  def: 0,

  // 🍗 PIPS (energia)
  comida: 7,
  maxComida: 7,

  // 🧬 ATRIBUTOS
  str: 0, // força
  ref: 0, // reflexo
  vel: 0, // velocidade
  int: 0, // inteligência

  // 🎲 DADOS BASE
  strDice: 10,
  refDice: 10,
  velDice: 10,
  intDice: 10,

  // 🎮 TURNOS
  movimento: 1,
  acao: 1,
  dodge: 0,

  // 📊 STATUS
  status: [],

  // 💰 PROGRESSÃO
  perolas: 0,
  nivel: 1,
  xp: 0,

  inventario: []
};

// 🎮 CLASSES SLUGCAT
const classes = {
  monk:   { hp: 35, atk: 2, def: 3 },
  survivor:{ hp: 30, atk: 3, def: 2 },
  hunter: { hp: 22, atk: 5, def: 1 }
};
const statsEvolucoes = {
  gourmond: { hp: 50, atk: 3, def: 6 },
  santo: { hp: 40, atk: 2, def: 7 },

  watcher: { hp: 38, atk: 5, def: 4 },
  inv: { hp: 36, atk: 6, def: 3 },

  artificer: { hp: 30, atk: 10, def: 1 },
  spearmaster: { hp: 28, atk: 9, def: 2 }
};
const evolucoes = {
  monk: ["gourmond", "santo"],
  survivor: ["watcher", "inv"],
  hunter: ["artificer", "spearmaster"]
};

function print(t, tipo="normal") {

  let classe = "msg-card";

  if (tipo === "evento") classe += " evento-card";
  if (tipo === "combate") classe += " combate-card";
  if (tipo === "sistema") classe += " sistema-card";

  let d = document.createElement("div");
  d.className = classe;
  d.innerText = t;

  term.appendChild(d);
  term.scrollTop = term.scrollHeight;
  updateHUD();
}

function updateHUD() {

  let imgPlayer = "img/" + player.classeAtual + ".png";

  let hpPercent = (player.hp / player.maxHp) * 100;

  // barra de comida (pips)
let pips = "";
for (let i = 0; i < player.maxComida; i++) {
  if (i < player.comida) {
    pips += "●";
  } else {
    pips += "○";
  }
}

  document.getElementById("player").innerHTML =
    "<img src='" + imgPlayer + "' width='100'><br>" +

    "SLUGCAT<br>" +
    "Classe: " + player.classeAtual + "<br><br>" +

    "Comida: " + pips + "<br><br>" +

    "HP<br>" +
"<div style='position:relative; border:2px solid #9bbc0f; width:100%; height:14px;'>" +

  "<div style='background:#4CAF50; width:" + hpPercent + "%; height:100%; transition:0.3s;'></div>" +

  "<div style='position:absolute; width:100%; top:0; left:0; text-align:center; font-size:10px; color:black; font-weight:bold;'>" +
    player.hp + " / " + player.maxHp +
  "</div>" +

"</div>" +

    "<br>ATK: " + player.atk +
"<br>DEF: " + player.def +
"<br><br>Sala: " + room + "/5" +
"<br>Fases concluídas: " + fasesCompletadas +
"<br><br>Nível: " + player.nivel +
"<br>Pérolas: " + player.perolas +
"<br><br>INV:<br>" +
(player.inventario.join(", ") || "Vazio");
}

function startGame() {
  printHTML(
    "<div class='box'>Escolha sua classe:</div>" +

    "<div class='card-container'>" +
      criarCardClasse("Monk", "monk", "img/monk.png") +
      criarCardClasse("Survivor", "survivor", "img/survivor.png") +
      criarCardClasse("Hunter", "hunter", "img/hunter.png") +
    "</div>"
  );

  modo = "class";
}
function selecionarClasse(cmd) {
  term.innerHTML = "";
  let c = classes[cmd];

  player.classeBase = cmd;
  player.classeAtual = cmd;

  player.hp = c.hp;
  player.maxHp = c.hp;
  player.atk = c.atk;
  player.def = c.def;

  player.evolucoes = evolucoes[cmd] || [];

  print("Classe escolhida: " + cmd);

  modo = "game";
  mostrarAcoes();
}
function mostrarAcoes() {
  setAcoes(
    "<button onclick='acaoExplorar()'>Explorar</button>" +
    "<button onclick='abrirInventario()'>Inventário</button>"
  );
}
function acaoExplorar() {
  nextRoom();
}

function abrirInventario() {

  if (player.inventario.length === 0) {
    print("Inventário vazio", "sistema");
    return;
  }

  let html = `
    <div class="box">🎒 Inventário</div>
    <div class="card-container">
  `;

  player.inventario.forEach(item => {

    html += `
      <div class="card">

        <div class="titulo-card">${item}</div>

        <button onclick="usarItem('${item}')">
          Usar
        </button>

      </div>
    `;

  });

  html += "</div>";

  printHTML(html);

  setAcoes("<button onclick='mostrarAcoes()'>Voltar</button>");
}

// 🎲 INIMIGOS
function enemyGen() {
  let list = [
    {name:"Scavenger", hp:25, atk:7},
    {name:"Lagarto rosa", hp:40, atk:8, def:1},
    {name:"Lagarto verde", hp:60, atk:14, def:2},
    {name:"Lagarto azul", hp:20, atk:6},
    {name:"Abutre", hp:120, atk:10},
    {name:"Centipede", hp:14, atk:5}
  ];
  return list[Math.floor(Math.random()*list.length)];
}

// 🏃 SALAS
function nextRoom() {
  room++;

  if (room > 5) {
    shelter();
    return;
  }

  print("Sala " + room, "evento");

  if (Math.random() < 0.7) combat();
  else event();
}

// 🏠 ABRIGO (5ª sala)
function shelter() {

  printHTML(`
    <div class="card" style="display:flex; gap:12px; align-items:center;">

      <img src="img/shelter.png" width="90">

      <div>
        <div class="titulo-card">🏕 Abrigo Seguro</div>
        <div>Você descansou...</div>
        <div style="color:#9aa3ad;">HP restaurado</div>
      </div>

    </div>
  `);

  player.hp = player.maxHp;

  player.comida = player.maxComida;

  room = 0;
  fase++;
  fasesCompletadas++;

  setAcoes("<button onclick='continuarAposAbrigo()'>Continuar</button>");

  modo = "shelter";
}
function continuarAposAbrigo() {
  print("Você sai do abrigo...", "evento");
  mostrarAcoes();
  modo = "game";
}

// ⚔️ COMBATE
function combat() {
  modo = "combat";
  enemy = enemyGen();

  alertaInimigo(enemy.name);

  print("⚔️ Inimigo: " + enemy.name, "combate");
  print("⚔️ Combate", "box");

setAcoes(
  "<button onclick='acaoAtacar()'>Atacar</button>" +
  "<button onclick='acaoDefender()'>Defender</button>" +
  "<button onclick='acaoAgir()'>Agir</button>" +
  "<button onclick='acaoFugir()'>Fugir</button>"
);

  updateEnemyHUD();
}

function enemyTurn() {

  let defesaTotal = player.def + defesaTemp;

  let dmg = Math.max(0, enemy.atk - defesaTotal);
  player.hp -= dmg;

  defesaTemp = 0; // reseta depois de usar

  print("Inimigo causa " + dmg, "combate");

  updateEnemyHUD();

  if (player.hp <= 0) {
    gameOver();
  }
}
function evoluirClasse(nova) {
  document.querySelectorAll(".evolucao-cards .card").forEach(card => {
  card.onclick = null;
  card.style.opacity = "0.5";
});

  if (!player.evolucoes.includes(nova)) {
    print("❌ Classe não desbloqueada!", "evento");
    return;
  }

  player.classeAtual = nova;

  player.evolucoes = player.evolucoes.filter(e => e !== nova);

  // 🔥 bônus únicos por evolução
  if (nova === "gourmond") {
    player.maxHp += 15;
    player.atk += 1;
    player.def += 3;
  }

  if (nova === "santo") {
    player.maxHp += 5;
    player.atk += 0;
    player.def += 4;
  }

  if (nova === "watcher") {
    player.maxHp += 8;
    player.atk += 2;
    player.def += 2;
  }

  if (nova === "inv") {
    player.maxHp += 6;
    player.atk += 3;
    player.def += 1;
  }

  if (nova === "artificer") {
    player.maxHp += 4;
    player.atk += 5;
    player.def += 0;
  }

  if (nova === "spearmaster") {
    player.maxHp += 3;
    player.atk += 4;
    player.def += 1;
  }

  player.hp = player.maxHp;

  print("✨ Evoluiu para: " + nova, "evento");
  printHTML(`
  <div class="card" style="margin-top:10px;">
    <img src="img/${nova}.png" width="100">
    <div class="titulo-card">${nova.toUpperCase()}</div>
    <div style="color:#9aa3ad;">Nova forma desbloqueada</div>
  </div>

  modo = "game";

`);
}
function ganharXP(valor) {
  player.xp += valor;

  if (player.xp >= player.nivel * 10) {
    player.xp -= player.nivel * 10;
    player.nivel++;

    print("✨ LEVEL UP! Nível " + player.nivel, "evento");

    escolherHabilidade();
  }
}

function escolherHabilidade() {
  let habilidades = [
    () => { player.atk += 1; print("ATK aumentado!"); },
    () => { player.maxHp += 5; player.hp += 5; print("HP aumentado!"); }
  ];

  let escolha = habilidades[Math.floor(Math.random() * habilidades.length)];
  escolha();
}

// 🎯 EVENTOS
function event() {
  let roll = Math.random();

  if (roll < 0.4) {
    print("Evento estranho na sala...", "evento");
  } 
  else if (roll < 0.7) {
    player.hp = Math.min(player.hp + 5, player.maxHp);
    print("Você encontrou comida (+5 HP)");
  } 
  else if (roll < 0.85) {
    eventoItem();
  }
  else if (roll < 0.95) {
    eventoLoja();
  }
  else {
    eventoEvolucao();
  }
}
function eventoEvolucao() {

  if (!player.evolucoes.length) {
    print("Nada acontece...", "evento");
    return;
  }

  print("🧬 Você sente seu corpo mudar...", "evento");
  print("Escolha uma evolução:", "evento");

  let html = `
  <div class='box'>🧬 Evoluções disponíveis:</div>
  <div class='card-container evolucao-cards'>
`;

player.evolucoes.forEach((e) => {
  html += criarCardClasse(
    e.toUpperCase(),
    e,
    "img/" + e + ".png"
  );
});

html += "</div>";

printHTML(html, "");

  modo = "evolucao";
}
function eventoItem() {

  let itens = ["pedra", "lança", "fruta"];
  let item = itens[Math.floor(Math.random() * itens.length)];

  player.inventario.push(item);

  print("🎁 Você encontrou: " + item, "evento");
}
function usarItem(nome) {

  if (player.comida <= 0) {
  print("Você está sem energia!", "evento");
  return;
}

  if (!player.inventario.includes(nome)) {
    print("Você não tem esse item!", "evento");
    return;
  }

  if (nome === "fruta") {
    player.hp = Math.min(player.hp + 10, player.maxHp);
    print("🍎 Você comeu uma fruta (+10 HP)");
  }

  if (nome === "pedra") {
  print("🪨 Você arremessa uma pedra!");

  if (enemy) {
    enemy.hp -= 3;

    if (enemy.hp <= 0) {
      print("Inimigo derrotado!");
      ganharXP(5);
      enemy = null;
      updateEnemyHUD();
      modo = "game";
    }
  }
}

  if (nome === "lança") {
    print("🔱 Ataque com lança!");
    if (enemy) {
  enemy.hp -= 6;

  if (enemy.hp <= 0) {
    print("Inimigo derrotado!");
    ganharXP(5);
    enemy = null;
    updateEnemyHUD();
    modo = "game";
  }
}
  }

  // remove item
  player.inventario = player.inventario.filter(i => i !== nome);
  
  player.comida--;

  abrirInventario();
}
function eventoLoja() {

  printHTML(`
  <div class="card mercador" style="display:flex; gap:12px; align-items:center;">

    <img src="img/scavenger_merchant.png" width="90">

    <div>
      <div class="titulo-card">🏪 Mercador Scavenger</div>

      <div style="color:#9aa3ad;">Trocas:</div>

      <div>🍎 Fruta — 2</div>
      <div>🪨 Pedra — 3</div>
      <div>🔱 Lança — 5</div>
    </div>

  </div>
`);

  setAcoes(
    "<button onclick='comprar(\"fruta\")'>Fruta</button>" +
    "<button onclick='comprar(\"pedra\")'>Pedra</button>" +
    "<button onclick='comprar(\"lanca\")'>Lança</button>" +
    "<button onclick='sairLoja()'>Sair</button>"
  );

  modo = "loja";
}
function comprar(item) {
  let preco = {
    fruta: 2,
    pedra: 3,
    lanca: 5
  };

  if (player.perolas >= preco[item]) {
    player.perolas -= preco[item];
    player.inventario.push(item);
    print("Comprou " + item);
  } else {
    print("Sem pérolas!");
  }

  mostrarAcoes();
}

function sairLoja() {
  print("Você saiu da loja.");
  mostrarAcoes();
}

function printHTML(html, c="") {
  let d = document.createElement("div");
  d.className = c;
  d.innerHTML = html; // 👈 aqui é o segredo
  term.appendChild(d);
  term.scrollTop = term.scrollHeight;
  updateHUD();
}
function alertaInimigo(nome) {
  printHTML(`
    <div class="alerta">
      <img src="img/danger.png" width="50">
      <div>⚠️ Perigo detectado: ${nome}</div>
    </div>
  `);
}
function setAcoes(html) {
  document.getElementById("actions").innerHTML =
    `<div class="actions-card">${html}</div>`;
}

function criarCardClasse(nome, classe, img, tipo="classe") {

  let c = classes[classe] || statsEvolucoes[classe] || { hp: "?", atk: "?", def: "?" };

  let acao = tipo === "evolucao"
    ? `evoluirClasse('${classe}')`
    : `selecionarClasse('${classe}')`;

  return `
  <div class="card" onclick="${acao}">

    <img src="${img}" width="80">

    <div>
      <div class="titulo-card">${nome}</div>

      <div>HP: ${c.hp}</div>
      <div>ATK: ${c.atk}</div>
      <div>DEF: ${c.def}</div>
    </div>

  </div>
  `;
}

function gameOver() {

  printHTML(
  "<div class='gameover'>" +

    "<div style='text-align:center; margin-bottom:10px;'>" +
      "<img src='img/player_death.png' width='120'>" +
    "</div>" +

    "💀 GAME OVER<br><br>" +

    "<div class='box'>" +
      "📊 ESTATÍSTICAS FINAIS<br><br>" +

      "Sala: " + room + "<br>" +
      "Fases concluídas: " + fasesCompletadas + "<br>" +
      "Nível: " + player.nivel + "<br>" +
      "Pérolas: " + player.perolas + "<br><br>" +

      "Itens:<br>" +
      (player.inventario.join(", ") || "Nenhum") +
    "</div>" +

    "<br><button onclick='reiniciarJogo()'>🔁 Reiniciar</button>" +

  "</div>"
);

  modo = "dead";
}

printHTML("<div class='box'><h2>Rain World Rogue</h2></div>");

setAcoes("<button onclick='startGame()'>Iniciar</button>");

updateHUD();
function updateEnemyHUD() {
  const info = document.getElementById("info");

  if (!enemy) {
    info.innerHTML = "Nenhuma criatura detectada...";
    return;
  }

  // define imagem baseada no nome
  let img = "";

  if (enemy.name === "Scavenger") img = "img/scavenger.png";
  if (enemy.name === "Lagarto rosa") img = "img/lagarto-rosa.png";
  if (enemy.name === "Lagarto verde") img = "img/lagarto-verde.png";
  if (enemy.name === "Lagarto azul") img = "img/lagarto-azul.png";
  if (enemy.name === "Abutre") img = "img/abutre.png";
  if (enemy.name === "Centipede") img = "img/centipede.png";

  let maxHp = enemy.maxHp || enemy.hp;
  let hpPercent = (enemy.hp / maxHp) * 100;

info.innerHTML =
  "<div>👾 INIMIGO</div><br>" +
  "<img src='" + img + "' width='120'><br><br>" +

  "HP<br>" +
  "<div style='position:relative; border:2px solid red; width:100%; height:14px;'>" +

    "<div style='background:red; width:" + hpPercent + "%; height:100%; transition:0.3s;'></div>" +

    "<div style='position:absolute; width:100%; top:0; left:0; text-align:center; font-size:10px; color:white; font-weight:bold; text-shadow: 0 0 3px black;'>" +
      enemy.hp + " / " + maxHp +
    "</div>" +

  "</div>" +

  "<br>ATK: " + enemy.atk;
}
function acaoAtacar() {
  if (!enemy) return;

  let crit = Math.random() < 0.25;
  let base = player.atk + Math.floor(Math.random()*6);
  let dmg = crit ? base * 2 : base;

  dmg = Math.max(0, dmg - (enemy.def || 0));

  enemy.hp -= dmg;

  print("Você causa " + dmg + (crit ? " 💥 CRÍTICO!" : ""));

  if (enemy.hp <= 0) {
    print("Inimigo derrotado!");
    player.perolas += Math.floor(Math.random()*3)+1;
    ganharXP(5);

    enemy = null;
    updateEnemyHUD();
    modo = "game";

    mostrarAcoes();
    return;
  }

  enemyTurn();
}

function acaoDefender() {
  defesaTemp = 3;
  print("🛡️ Defesa ativada!");
  enemyTurn();
}

function acaoAgir() {
  if (Math.random() < 0.5) {
    print("Você desviou!");
  } else {
    print("Falhou!");
    enemyTurn();
  }

  // 🔥 REEXIBE BOTÕES DE COMBATE
  if (enemy) {
    setAcoes(
  "<button onclick='acaoAtacar()'>Atacar</button>" +
  "<button onclick='acaoDefender()'>Defender</button>" +
  "<button onclick='acaoAgir()'>Agir</button>" +
  "<button onclick='acaoFugir()'>Fugir</button>"
);
  }
}

function acaoFugir() {
  if (Math.random() > 0.5) {
    print("Você fugiu!");
    enemy = null;
    updateEnemyHUD();
    modo = "game";
    mostrarAcoes();
  } else {
    print("Falha ao fugir!");
    enemyTurn();
  }
}
function reiniciarJogo() {
  location.reload();
}

</script>
